name: Deploy Plugin

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4        # ← Updated from v3

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.dharanifreelancer.digital
          username: devv@ok.medkorse.in
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: wp-content/plugins/return-guard-wc/   # ← Removed leading /
          local-dir: ./                                      # ← Explicit local path
          dangerous-clean-slate: true                        # ← Forces full re-upload
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/log